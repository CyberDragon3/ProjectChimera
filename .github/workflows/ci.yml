name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (Linux)
        if: runner.os == 'Linux'
        run: python -m pip install -e ".[ui,llm,dev]"

      - name: Install (Windows)
        if: runner.os == 'Windows'
        run: python -m pip install -e ".[windows,ui,llm,dev]"

      - name: Ruff lint
        run: python -m ruff check src tests

      - name: Pytest
        run: python -m pytest -q

  safety-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - name: Audit kill/terminate calls pass through safety gate
        run: python -m pytest tests/test_safety_audit.py -q
