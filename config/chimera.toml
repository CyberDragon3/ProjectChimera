# Project Chimera default configuration
# Copy to chimera.local.toml for overrides.

[protected_species]
# Processes that Chimera can NEVER terminate or forcibly de-prioritize.
# Loaded once at boot into an immutable frozenset.
[protected_species]
processes = [
    # --- Core Kernel & System Organs ---
    "System", "Registry", "smss.exe", "csrss.exe", "wininit.exe", 
    "winlogon.exe", "services.exe", "lsass.exe", "SystemInterrupts",
    "MemCompression", "fontdrvhost.exe", "spoolsv.exe",

    # --- The Nervous System (Drivers & Shell) ---
    "svchost.exe", "dwm.exe", "explorer.exe", "ShellExperienceHost.exe",
    "StartMenuExperienceHost.exe", "SearchHost.exe", "RuntimeBroker.exe",
    "ctfmon.exe", "conhost.exe", "taskhostw.exe",

    # --- Hardware & Metabolism ---
    "SystemSettings.exe", "Taskmgr.exe", "perfmon.exe", "resmon.exe",
    "nvdisplay.container.exe", "RtkAudUService64.exe",

    # --- The "Self" (Do not eat the brain) ---
    "python.exe", "pythonw.exe", "chimera.exe", "cmd.exe", "powershell.exe",

    # --- Tooling & Intentional Apps ---
    "Code.exe", "cursor.exe", "chrome.exe", "firefox.exe", "msedge.exe",
    "Discord.exe", "Slack.exe"
]

[thresholds]
cpu_spike_percent = 85.0          # %
cpu_sustained_seconds = 1.0        # seconds above threshold before reflex fires
thermal_slope_c_per_min = 2.5      # °C/min — Zebrafish alert
idle_seconds = 300                 # seconds of input inactivity = "away"
reflex_deadline_ms = 10            # hard deadline per reflex tick
# — Zebrafish hard-floor (design §5.1)
# thermal_critical_c = 95.0
# thermal_critical_clear_c = 90.0
# thermal_critical_samples = 2
# thermal_critical_max_hold_seconds = 300

[poll]
cpu_interval_ms = 250
idle_interval_ms = 1000
thermal_interval_ms = 5000
window_interval_ms = 1000

[store]
ring_buffer_seconds = 300          # retain 5 min of telemetry per metric

[llm]
enabled = false
provider = "ollama"                # "ollama" | "claude"
model = "phi3:mini"                # for ollama
claude_model = "claude-haiku-4-5"
min_interval_seconds = 30          # circuit breaker
max_daily_calls = 500

[dashboard]
enabled = true
host = "127.0.0.1"
port = 8765

[logging]
level = "INFO"
format = "json"                    # "json" | "console"

[lysosome]
enabled = true
sweep_interval_seconds = 600   # don't re-sweep within 10 min
targets = []                    # opt-in exe names for phase-3 kill
